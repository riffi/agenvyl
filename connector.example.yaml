version: 1

listen:
  host: 127.0.0.1
  port: 4310

workspaces:
  # Empty means ${AGENVYL_WORKSPACE_ROOT} or the XDG data path used by Core.
  roots: []

instances:
  - id: local-hermes
    type: hermes
    enabled: true
  - id: local-opencode
    type: opencode
    enabled: false
  - id: local-codex
    type: codex
    enabled: false
    # Publishes danger-full-access modes. Keep false unless the machine is trusted.
    allowDangerFullAccess: false
  - id: local-antigravity
    type: antigravity
    enabled: false
