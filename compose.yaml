name: agenvyl

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - ${AGENVYL_POSTGRES_BIND_ADDRESS:-127.0.0.1}:${AGENVYL_POSTGRES_PORT:-5432}:5432
    environment:
      POSTGRES_DB: agenvyl
      POSTGRES_USER: agenvyl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenvyl}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenvyl -d agenvyl"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
