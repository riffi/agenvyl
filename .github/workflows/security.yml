name: Security

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - LICENSE
      - SECURITY.md
      - CONTRIBUTING.md
      - scripts/audit-oss-baseline.mjs
      - .github/workflows/security.yml
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - LICENSE
      - SECURITY.md
      - CONTRIBUTING.md
      - scripts/audit-oss-baseline.mjs
      - .github/workflows/security.yml
  schedule:
    - cron: "17 3 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:oss
      - run: npm audit --omit=dev --audit-level=high
