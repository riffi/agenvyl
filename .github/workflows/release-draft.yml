name: Release Draft

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: GitHub release classification and manifest channel
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable
      postgres_artifact_run_id:
        description: PostgreSQL Runtime run ID used when native caches miss
        required: false
        type: string
      rebuild_postgres:
        description: Rebuild PostgreSQL payloads
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write

jobs:
  portable:
    uses: ./.github/workflows/portable.yml
    with:
      target: all
      postgres_artifact_run_id: ${{ inputs.postgres_artifact_run_id }}
      rebuild_postgres: ${{ inputs.rebuild_postgres }}

  draft-release:
    needs: portable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify release version and notes
        run: npm run release:verify
      - uses: actions/download-artifact@v4
        with:
          name: agenvyl-linux-x64
          path: artifacts/portable
      - uses: actions/download-artifact@v4
        with:
          name: agenvyl-linux-arm64
          path: artifacts/portable
      - uses: actions/download-artifact@v4
        with:
          name: agenvyl-darwin-x64
          path: artifacts/portable
      - uses: actions/download-artifact@v4
        with:
          name: agenvyl-darwin-arm64
          path: artifacts/portable
      - uses: actions/download-artifact@v4
        with:
          name: agenvyl-windows-x64
          path: artifacts/portable
      - id: metadata
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          release_type="${{ inputs.release_type }}"
          if [ "$release_type" = stable ]; then
            channel=stable
            prerelease=false
            title="Agenvyl v$version"
          else
            channel=preview
            prerelease=true
            title="Agenvyl v$version Technical Preview"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "notes=docs/releases/v$version.md" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
      - name: Build release manifest and shell index
        shell: bash
        run: >-
          node scripts/release-manifest.mjs
          --version "${{ steps.metadata.outputs.version }}"
          --channel "${{ steps.metadata.outputs.channel }}"
          --base-url "https://github.com/${{ github.repository }}/releases/download/${{ steps.metadata.outputs.tag }}/"
          artifacts/portable/agenvyl-${{ steps.metadata.outputs.version }}-linux-x64.tar.xz
          artifacts/portable/agenvyl-${{ steps.metadata.outputs.version }}-linux-arm64.tar.xz
          artifacts/portable/agenvyl-${{ steps.metadata.outputs.version }}-darwin-x64.zip
          artifacts/portable/agenvyl-${{ steps.metadata.outputs.version }}-darwin-arm64.zip
          artifacts/portable/agenvyl-${{ steps.metadata.outputs.version }}-windows-x64.zip
      - name: Validate installer syntax
        run: sh -n packaging/install.sh
      - name: Assemble supply-chain assets
        shell: bash
        run: |
          cp artifacts/portable/agenvyl-* artifacts/release/
          cp packaging/install.sh packaging/install.ps1 artifacts/release/
          cp docs/user-guide/trust-and-security.md artifacts/release/TRUST.md
          npm sbom --package-lock-only --omit=dev --sbom-format cyclonedx > artifacts/release/agenvyl-sbom.cdx.json
          node -e "const fs=require('node:fs'); JSON.parse(fs.readFileSync('artifacts/release/agenvyl-sbom.cdx.json','utf8'))"
          (cd artifacts/release && sha256sum agenvyl-* install.sh install.ps1 TRUST.md > SHA256SUMS)
      - name: Attest release build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/*
      - name: Create or update draft release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.metadata.outputs.notes }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.title }}
          RELEASE_PRERELEASE: ${{ steps.metadata.outputs.prerelease }}
        shell: bash
        run: |
          if ! release_json=$(gh release view "$RELEASE_TAG" --json isDraft,isPrerelease,targetCommitish 2>/dev/null); then
            create_args=(
              "$RELEASE_TAG"
              --draft
              --target "$GITHUB_SHA"
              --title "$RELEASE_TITLE"
              --notes-file "$RELEASE_NOTES"
            )
            if [ "$RELEASE_PRERELEASE" = true ]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          else
            is_draft=$(printf '%s\n' "$release_json" | jq -r '.isDraft')
            if [ "$is_draft" != true ]; then
              echo "::error::Release $RELEASE_TAG is already published. Published release assets are immutable."
              exit 1
            fi

            target=$(printf '%s\n' "$release_json" | jq -r '.targetCommitish')
            target_sha=$(gh api "repos/$GITHUB_REPOSITORY/commits/$target" --jq '.sha')
            if [ "$target_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Draft $RELEASE_TAG targets $target_sha, but this workflow is building $GITHUB_SHA."
              exit 1
            fi

            is_prerelease=$(printf '%s\n' "$release_json" | jq -r '.isPrerelease')
            if [ "$is_prerelease" != "$RELEASE_PRERELEASE" ]; then
              echo "::error::Draft $RELEASE_TAG has prerelease=$is_prerelease, but this run requested prerelease=$RELEASE_PRERELEASE. Delete the obsolete draft deliberately before changing release type."
              exit 1
            fi

            gh release edit "$RELEASE_TAG" \
              --draft \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES"
          fi
          gh release upload "$RELEASE_TAG" --clobber artifacts/release/*
