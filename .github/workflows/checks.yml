name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_DATABASE_URL: postgres://agenvyl_ci:agenvyl_ci@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: agenvyl_ci
          POSTGRES_PASSWORD: agenvyl_ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenvyl_ci -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:local
      - run: npm run build
