name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_DATABASE_URL: postgres://agenvyl_ci:agenvyl_ci@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: agenvyl_ci
          POSTGRES_PASSWORD: agenvyl_ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenvyl_ci -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint:boundaries
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:oss
      - run: npm audit --omit=dev --audit-level=high

  runtime-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/build-runtime-bundle.mjs --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: agenvyl-linux-${{ matrix.arch }}
          path: |
            artifacts/*.tar.xz
            artifacts/*.sha256
