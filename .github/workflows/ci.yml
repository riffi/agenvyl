name: CI

on:
  push:
  pull_request:

jobs:
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:codex
      - run: npm run test:e2e:codex
      - run: npm run lint:boundaries

  full-linux:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: hermes_group_chat
          POSTGRES_PASSWORD: hermes_group_chat
          POSTGRES_DB: hermes_group_chat
        ports:
          - 8793:5432
        options: >-
          --health-cmd "pg_isready -U hermes_group_chat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
