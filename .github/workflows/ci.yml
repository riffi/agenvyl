name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_DATABASE_URL: postgres://agenvyl_ci:agenvyl_ci@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: agenvyl_ci
          POSTGRES_PASSWORD: agenvyl_ci
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenvyl_ci -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint:boundaries
      - run: npm run build

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run audit:oss
      - run: npm audit --omit=dev --audit-level=high

  runtime-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/build-runtime-bundle.mjs --arch ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: agenvyl-linux-${{ matrix.arch }}
          path: |
            artifacts/*.tar.xz
            artifacts/*.sha256

  postgres-runtime-probes:
    name: PostgreSQL ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-24.04
            platform: linux
            arch: x64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - target: darwin-x64
            os: macos-15-intel
            platform: darwin
            arch: x64
          - target: darwin-arm64
            os: macos-15
            platform: darwin
            arch: arm64
          - target: windows-x64
            os: windows-2025
            platform: win32
            arch: x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bison flex
      - if: runner.os == 'macOS'
        run: |
          brew install bison flex
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install winflexbison3 --no-progress -y
          py -m pip install meson ninja
          py -c "import sysconfig; print(sysconfig.get_path('scripts'))" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - run: >-
          node scripts/build-postgres-runtime.mjs
          --platform ${{ matrix.platform }}
          --arch ${{ matrix.arch }}
          --jobs 2
      - uses: actions/upload-artifact@v4
        with:
          name: agenvyl-postgres-${{ matrix.target }}
          path: |
            artifacts/postgres-runtime/*.tar.gz
            artifacts/postgres-runtime/*.sha256
      - shell: bash
        run: node scripts/verify-postgres-runtime.mjs artifacts/postgres-runtime/*.tar.gz

  preview-signing-boundary:
    if: ${{ vars.AGENVYL_ENABLE_PREVIEW_SIGNING == 'true' }}
    needs: postgres-runtime-probes
    runs-on: ubuntu-latest
    steps:
      - run: >-
          echo "Preview signing is enabled, but publisher-specific signing remains
          intentionally external to the unsigned runtime probe artifacts."
